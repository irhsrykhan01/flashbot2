<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLASHBOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────
   RESET & TOKENS
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0d0f;
  --s1:       #141417;
  --s2:       #1c1c21;
  --s3:       #242429;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);

  --accent:   #7c6fff;
  --accent-d: #6355e0;
  --accent-g: linear-gradient(135deg, #7c6fff, #a78bfa);
  --accent-glow: rgba(124,111,255,0.18);

  --text:     #e8e8f0;
  --text2:    #8888a0;
  --text3:    #505060;

  --user-bg:  #1e1b36;
  --user-border: rgba(124,111,255,0.2);

  --ai-bg:    #141417;
  --ai-border: rgba(255,255,255,0.07);

  --r:   12px;
  --r-lg: 18px;
  --sb:  260px;

  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html, body {
  height: 100%; height: 100dvh;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

button { font-family: var(--font); cursor: pointer; }

/* ─────────────────────────────────────────
   LAYOUT
───────────────────────────────────────── */
.app {
  display: flex;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ─────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────── */
.sidebar {
  width: var(--sb);
  flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .28s cubic-bezier(.4,0,.2,1),
              transform .28s cubic-bezier(.4,0,.2,1);
  z-index: 20;
}

/* Mobile overlay */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    z-index: 50;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 49;
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.open { display: block; }
}

/* Sidebar header */
.sb-head {
  padding: 16px 12px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  display: flex; align-items: center; gap: 9px;
  flex: 1; min-width: 0;
  text-decoration: none;
}
.logo-icon {
  width: 28px; height: 28px; flex-shrink: 0;
  border-radius: 7px;
  background: var(--accent-g);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.logo-text {
  font-size: 14px; font-weight: 600;
  letter-spacing: .3px;
  color: var(--text);
  white-space: nowrap;
}

.new-chat-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 18px; line-height: 1;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.new-chat-btn:hover { background: var(--s3); color: var(--text); border-color: var(--border2); }

/* History list */
.sb-history {
  flex: 1;
  overflow-y: auto;
  padding: 8px 6px;
}
.sb-history::-webkit-scrollbar { width: 3px; }
.sb-history::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 3px; }

.history-section-label {
  font-size: 11px; font-weight: 500;
  color: var(--text3);
  padding: 6px 8px 4px;
  letter-spacing: .3px;
}

.history-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  transition: background .12s, color .12s;
  position: relative;
  min-width: 0;
}
.history-item:hover { background: var(--s2); color: var(--text); }
.history-item.active {
  background: var(--s2);
  color: var(--text);
}
.history-item.active::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 2px; border-radius: 2px;
  background: var(--accent);
}
.history-item-icon { font-size: 13px; flex-shrink: 0; opacity: .6; }
.history-item-title {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-size: 13px;
}
.history-item-del {
  opacity: 0; flex-shrink: 0;
  width: 20px; height: 20px;
  border-radius: 5px; border: none;
  background: transparent; color: var(--text3);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .12s, background .12s, color .12s;
}
.history-item:hover .history-item-del { opacity: 1; }
.history-item-del:hover { background: rgba(255,80,80,.12); color: #ff6b6b; }

/* Sidebar footer */
.sb-foot {
  padding: 10px 6px 12px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 2px;
  flex-shrink: 0;
}

.sb-foot-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  border-radius: 8px; border: none;
  background: transparent; color: var(--text2);
  font-size: 13px; text-align: left; width: 100%;
  transition: background .12s, color .12s;
}
.sb-foot-btn:hover { background: var(--s2); color: var(--text); }
.sb-foot-icon { font-size: 15px; flex-shrink: 0; width: 18px; text-align: center; }

/* ─────────────────────────────────────────
   MAIN
───────────────────────────────────────── */
.main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Topbar */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.menu-btn {
  display: none;
  width: 32px; height: 32px;
  border-radius: 8px; border: none;
  background: transparent; color: var(--text2);
  font-size: 18px; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .12s, color .12s;
}
@media (max-width: 768px) { .menu-btn { display: flex; } }
.menu-btn:hover { background: var(--s2); color: var(--text); }

.topbar-model {
  display: flex; align-items: center; gap: 6px;
  flex: 1; min-width: 0;
}
.model-select {
  background: transparent; border: none;
  color: var(--text2); font-family: var(--font);
  font-size: 13px; font-weight: 500;
  cursor: pointer; outline: none;
  max-width: 200px;
}
.model-select:hover { color: var(--text); }
.model-select option { background: #1c1c21; color: var(--text); }
.model-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #3dd68c;
  box-shadow: 0 0 6px #3dd68c;
  flex-shrink: 0;
}

.persona-badge {
  font-size: 11.5px; padding: 3px 10px;
  border-radius: 20px;
  background: rgba(124,111,255,.1);
  border: 1px solid rgba(124,111,255,.2);
  color: var(--accent);
  white-space: nowrap; cursor: pointer;
  transition: background .12s;
}
.persona-badge:hover { background: rgba(124,111,255,.18); }

/* ─────────────────────────────────────────
   MESSAGES
───────────────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  padding: 24px 16px 16px;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 4px; }

/* Empty / Welcome */
.welcome {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 32px 20px;
  gap: 12px;
}
.welcome-logo {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: var(--accent-g);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: #fff;
  box-shadow: 0 4px 24px var(--accent-glow);
  margin-bottom: 4px;
}
.welcome h1 {
  font-size: 22px; font-weight: 600;
  color: var(--text);
}
.welcome p {
  font-size: 13.5px; color: var(--text2);
  max-width: 300px; line-height: 1.6;
}
.chips {
  display: flex; flex-wrap: wrap;
  gap: 8px; justify-content: center;
  max-width: 520px; margin-top: 8px;
}
.chip {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--s1);
  font-size: 12.5px; color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.chip:hover {
  border-color: rgba(124,111,255,.4);
  color: var(--accent);
  background: rgba(124,111,255,.06);
}

/* Message row */
.msg-group {
  display: flex; flex-direction: column;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  padding: 3px 0;
}
.msg-group.user { align-items: flex-end; }
.msg-group.ai   { align-items: flex-start; }

.msg-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--text3);
  padding: 0 4px 3px;
}
.msg-meta-name { font-weight: 500; color: var(--text2); }

.bubble {
  padding: 10px 14px;
  border-radius: var(--r);
  font-size: 13.5px;
  line-height: 1.7;
  /* CRITICAL TEXT FIX */
  word-break: break-word;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  min-width: 0;
  max-width: 100%;
}

.bubble.user {
  background: var(--user-bg);
  border: 1px solid var(--user-border);
  border-bottom-right-radius: 4px;
  color: var(--text);
  white-space: pre-wrap;
}

.bubble.ai {
  background: var(--ai-bg);
  border: 1px solid var(--ai-border);
  border-bottom-left-radius: 4px;
  color: var(--text);
  white-space: normal; /* AI uses HTML rendered content */
}

/* AI formatted content */
.bubble.ai p { margin-bottom: .5em; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
.bubble.ai p:last-child { margin-bottom: 0; }

.bubble.ai strong { color: #fff; font-weight: 600; }
.bubble.ai em { color: var(--text2); }

.bubble.ai ul, .bubble.ai ol {
  padding-left: 1.4em;
  margin: .4em 0;
}
.bubble.ai li {
  margin-bottom: .25em;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.bubble.ai code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(124,111,255,.1);
  border: 1px solid rgba(124,111,255,.15);
  padding: 1px 5px; border-radius: 4px;
  color: #b4a8ff;
  word-break: break-all;
}

.bubble.ai pre {
  background: #0a0a0d;
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 8px 0;
  position: relative;
}
.bubble.ai pre code {
  font-family: var(--mono);
  font-size: 12px;
  background: none; border: none;
  padding: 0; color: #c8c8e8;
  word-break: normal;
  white-space: pre;
  overflow-wrap: normal;
}

.bubble.ai h1,.bubble.ai h2,.bubble.ai h3 {
  font-weight: 600; margin: .6em 0 .3em;
  color: #fff;
}
.bubble.ai h1 { font-size: 16px; }
.bubble.ai h2 { font-size: 15px; }
.bubble.ai h3 { font-size: 14px; }

.bubble.ai hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 8px 0;
}

.bubble.ai blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 12px; margin: 6px 0;
  color: var(--text2);
}

/* Typing cursor */
.cursor {
  display: inline-block;
  width: 2px; height: 14px;
  background: var(--accent);
  border-radius: 1px;
  margin-left: 1px;
  vertical-align: middle;
  animation: blink .8s step-end infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

/* Bubble actions */
.bubble-actions {
  display: flex; gap: 4px;
  padding: 4px 2px 0;
  opacity: 0;
  transition: opacity .15s;
}
.msg-group:hover .bubble-actions { opacity: 1; }

.action-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--s1);
  color: var(--text2);
  font-size: 11.5px; font-weight: 500;
  transition: all .12s;
}
.action-btn:hover { background: var(--s2); color: var(--text); border-color: var(--border2); }
.action-btn.success { color: #3dd68c; border-color: rgba(61,214,140,.25); }

/* Typing indicator dots */
.typing-ind {
  display: flex; align-items: center; gap: 5px;
  padding: 12px 14px;
  background: var(--ai-bg);
  border: 1px solid var(--ai-border);
  border-radius: var(--r);
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing-ind span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3);
  animation: tdot 1.2s ease-in-out infinite;
}
.typing-ind span:nth-child(2) { animation-delay: .15s; }
.typing-ind span:nth-child(3) { animation-delay: .30s; }
@keyframes tdot {
  0%,60%,100% { transform: translateY(0); background: var(--text3); }
  30% { transform: translateY(-5px); background: var(--accent); }
}

/* ─────────────────────────────────────────
   INPUT AREA
───────────────────────────────────────── */
.input-wrap {
  padding: 12px 16px 16px;
  flex-shrink: 0;
  background: var(--bg);
}

.input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  padding: 10px 12px;
  max-width: 720px;
  margin: 0 auto;
  transition: border-color .2s, box-shadow .2s;
}
.input-box:focus-within {
  border-color: rgba(124,111,255,.4);
  box-shadow: 0 0 0 3px rgba(124,111,255,.06);
}

.input-left {
  display: flex; align-items: flex-end; gap: 4px;
  flex-shrink: 0;
}

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px; border: none;
  background: transparent; color: var(--text3);
  font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
  flex-shrink: 0;
  position: relative;
}
.icon-btn:hover { background: var(--s3); color: var(--text2); }

#file-input { display: none; }

.file-preview {
  display: none;
  padding: 6px 10px;
  background: rgba(124,111,255,.08);
  border: 1px solid rgba(124,111,255,.2);
  border-radius: 8px;
  font-size: 12px; color: var(--accent);
  max-width: 720px; margin: 0 auto 6px;
  gap: 8px; align-items: center;
}
.file-preview.show { display: flex; }
.file-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-preview-rm {
  border: none; background: transparent;
  color: var(--text3); font-size: 14px; cursor: pointer;
}

#msg-input {
  flex: 1; min-width: 0;
  background: none; border: none; outline: none;
  font-family: var(--font); font-size: 13.5px;
  color: var(--text); resize: none;
  min-height: 22px; max-height: 180px;
  line-height: 1.6; overflow-y: auto;
  word-break: break-word;
}
#msg-input::placeholder { color: var(--text3); }
#msg-input::-webkit-scrollbar { width: 3px; }

.send-btn {
  width: 34px; height: 34px;
  border-radius: 9px; border: none;
  background: var(--accent-g);
  color: #fff; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 10px var(--accent-glow);
  transition: transform .15s, opacity .15s, box-shadow .15s;
}
.send-btn:hover:not(:disabled) {
  transform: scale(1.06);
  box-shadow: 0 4px 18px rgba(124,111,255,.35);
}
.send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

.input-hint {
  text-align: center; font-size: 11px; color: var(--text3);
  margin-top: 7px; max-width: 720px; margin-inline: auto;
}

/* ─────────────────────────────────────────
   MODALS
───────────────────────────────────────── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  z-index: 100;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }

.modal {
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 28px 26px 24px;
  width: 100%; max-width: 460px;
  position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.modal::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,111,255,.5), transparent);
}

.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px; border-radius: 7px;
  border: none; background: var(--s2); color: var(--text2);
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s, color .12s;
}
.modal-close:hover { background: var(--s3); color: var(--text); }

.modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 5px; }
.modal p  { font-size: 12.5px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
.modal p a { color: var(--accent); text-decoration: none; }
.modal p a:hover { text-decoration: underline; }

.modal-label {
  font-size: 12px; font-weight: 500; color: var(--text2);
  margin-bottom: 5px; display: block;
}

.modal-input {
  width: 100%; padding: 10px 13px;
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: var(--mono); font-size: 13px;
  outline: none; transition: border-color .15s;
}
.modal-input:focus { border-color: rgba(124,111,255,.4); }

.modal-textarea {
  width: 100%; padding: 10px 13px;
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: var(--font); font-size: 13px;
  outline: none; resize: vertical; min-height: 90px;
  transition: border-color .15s; line-height: 1.6;
}
.modal-textarea:focus { border-color: rgba(124,111,255,.4); }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

.btn { padding: 8px 18px; border-radius: 9px; font-size: 13px; font-weight: 500; border: none; transition: all .15s; }
.btn-ghost { background: var(--s2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--s3); color: var(--text); }
.btn-primary { background: var(--accent-g); color: #fff; box-shadow: 0 2px 12px var(--accent-glow); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,111,255,.3); }

/* Persona list in modal */
.persona-grid { display: flex; flex-direction: column; gap: 4px; }
.persona-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  border: 1px solid transparent; cursor: pointer;
  background: var(--s2); transition: all .12s;
}
.persona-option:hover { background: var(--s3); }
.persona-option.active {
  background: rgba(124,111,255,.08);
  border-color: rgba(124,111,255,.25);
}
.persona-option-icon { font-size: 18px; flex-shrink: 0; }
.persona-option-info { flex: 1; min-width: 0; }
.persona-option-name { font-size: 13.5px; font-weight: 500; }
.persona-option-desc { font-size: 11.5px; color: var(--text2); margin-top: 1px; }
.persona-check { color: var(--accent); font-size: 14px; }

/* Settings rows */
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 13px; font-weight: 500; }
.setting-sub   { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 9px 16px;
  font-size: 12.5px; color: var(--text);
  z-index: 300;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  transition: transform .25s, opacity .25s;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.toast.ok  { color: #3dd68c; border-color: rgba(61,214,140,.25); }
.toast.err { color: #ff7b7b; border-color: rgba(255,100,100,.25); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar" id="sidebar">

<script>
'use strict';
// ═══════════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'flashbot_v3';

const PERSONAS = [
  {
    id: 'adaptive',
    icon: '🌊',
    name: 'Adaptive (Default)',
    desc: 'Menyesuaikan gaya bicara otomatis dengan user',
    prompt: `You are FLASHBOT, an adaptive AI assistant. Automatically match the user's communication style:
- Casual user → be casual, relaxed, friendly
- Formal user → be professional and structured
- User uses emoji → you can use emoji naturally (don't overdo it)
- Short messages → give concise answers
- Detailed messages → give detailed, thorough answers
- Technical user → use technical terms
Always be genuinely helpful. Reply in the same language the user uses.`
  },
  {
    id: 'coder',
    icon: '💻',
    name: 'Coder',
    desc: 'Senior engineer – clean code + penjelasan singkat',
    prompt: `You are FLASHBOT, a senior software engineer. Provide clean, efficient, working code.
Always include brief explanations. Use comments in code when helpful.
Reply in the same language the user uses. For bugs, explain root cause then fix.`
  },
  {
    id: 'writer',
    icon: '✍️',
    name: 'Penulis Kreatif',
    desc: 'Konten kreatif, artikel, copywriting',
    prompt: `Kamu adalah FLASHBOT, penulis kreatif profesional. Tulis konten yang engaging, mengalir natural, dan berkarakter.
Sesuaikan tone dengan kebutuhan: artikel formal, caption santai, cerita imajinatif.
Gunakan bahasa yang sama dengan user.`
  },
  {
    id: 'analyst',
    icon: '📊',
    name: 'Analis',
    desc: 'Analisis data, riset, pemecahan masalah terstruktur',
    prompt: `You are FLASHBOT, a sharp analytical assistant. Break down problems systematically.
Use structured format with clear sections when appropriate. Be precise and evidence-based.
Reply in the same language the user uses.`
  },
  {
    id: 'custom',
    icon: '✨',
    name: 'Custom',
    desc: 'Tulis instruksi sendiri',
    prompt: ''
  }
];

const CHIPS = [
  '⚡ Tulis fungsi Python untuk web scraping',
  '🎯 Bantu buat pitch deck startup',
  '🔍 Jelaskan cara kerja Large Language Model',
  '✍️ Draft email profesional ke klien',
  '🐛 Debug kode dan jelaskan errornya',
  '💡 Ide bisnis online yang low-cost',
];

const MODELS = {
  'llama-3.3-70b-versatile': 'Llama 3.3 70B',
  'llama-3.1-8b-instant':    'Llama 3.1 8B ⚡',
  'mixtral-8x7b-32768':      'Mixtral 8x7B',
  'gemma2-9b-it':            'Gemma 2 9B',
  'compound-beta':           'Compound Beta',
};

let state = {
  chats: [],          // [{id, title, messages, createdAt}]
  activeChatId: null,
  personaId: 'adaptive',
  customPrompt: '',
  model: 'llama-3.3-70b-versatile',
};

let isStreaming = false;
let attachedFile = null;
let pendingRegenMessages = null; // for regenerate

// ═══════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    state.chats       = saved.chats       || [];
    state.activeChatId= saved.activeChatId|| null;
    state.personaId   = saved.personaId   || 'adaptive';
    state.customPrompt= saved.customPrompt|| '';
    state.model       = saved.model       || 'llama-3.3-70b-versatile';
    // restore custom persona prompt
    const cp = PERSONAS.find(p => p.id === 'custom');
    if (cp) cp.prompt = state.customPrompt;
  } catch(e) { /* ignore */ }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      chats:        state.chats,
      activeChatId: state.activeChatId,
      personaId:    state.personaId,
      customPrompt: state.customPrompt,
      model:        state.model,
    }));
  } catch(e) { /* ignore */ }
}

// ═══════════════════════════════════════════════════
//  CHAT MANAGEMENT
// ═══════════════════════════════════════════════════
function newChat() {
  const id = 'c' + Date.now();
  const chat = { id, title: 'New Chat', messages: [], createdAt: Date.now() };
  state.chats.unshift(chat);
  state.activeChatId = id;
  saveState();
  renderSidebar();
  renderMessages();
  closeSidebar(); // close on mobile
}

function switchChat(id) {
  if (state.activeChatId === id) return;
  state.activeChatId = id;
  saveState();
  renderSidebar();
  renderMessages();
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) {
    state.activeChatId = state.chats.length ? state.chats[0].id : null;
  }
  if (!state.activeChatId && state.chats.length === 0) newChat();
  saveState();
  renderSidebar();
  renderMessages();
}

function getActiveChat() {
  return state.chats.find(c => c.id === state.activeChatId);
}

function clearAllHistory() {
  state.chats = [];
  state.activeChatId = null;
  saveState();
  closeModal('settings-modal');
  newChat();
  toast('Semua history dihapus', 'ok');
}

// ═══════════════════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('sb-history');
  if (!state.chats.length) {
    el.innerHTML = '<div style="padding:20px 12px;font-size:12.5px;color:var(--text3);text-align:center">Belum ada chat.<br>Klik ＋ untuk mulai.</div>';
    return;
  }

  // Group by date
  const today    = dateKey(new Date());
  const yesterday= dateKey(new Date(Date.now()-864e5));

  const groups = {};
  state.chats.forEach(c => {
    const k = dateKey(new Date(c.createdAt));
    const label = k === today ? 'Hari Ini' : k === yesterday ? 'Kemarin' : formatDateLabel(new Date(c.createdAt));
    if (!groups[label]) groups[label] = [];
    groups[label].push(c);
  });

  let html = '';
  for (const [label, chats] of Object.entries(groups)) {
    html += `<div class="history-section-label">${label}</div>`;
    chats.forEach(c => {
      const active = c.id === state.activeChatId ? 'active' : '';
      html += `
        <div class="history-item ${active}" onclick="switchChat('${c.id}')">
          <span class="history-item-icon">💬</span>
          <span class="history-item-title">${esc(c.title)}</span>
          <button class="history-item-del" onclick="deleteChat('${c.id}',event)" title="Hapus">🗑</button>
        </div>`;
    });
  }
  el.innerHTML = html;
}

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDateLabel(d) {
  return d.toLocaleDateString('id-ID', { day:'numeric', month:'long' });
}

// ═══════════════════════════════════════════════════
//  RENDER MESSAGES
// ═══════════════════════════════════════════════════
function renderMessages() {
  const el = document.getElementById('messages');
  const chat = getActiveChat();

  if (!chat || !chat.messages.length) {
    el.innerHTML = `
      <div class="welcome">
        <div class="welcome-logo">F</div>
        <h1>FLASHBOT</h1>
        <p>AI modern yang adaptif — siap bantu coding, nulis, analisis, dan lainnya.</p>
        <div class="chips">
          ${CHIPS.map(c => `<div class="chip" onclick="chipSend('${esc(c)}')">${c}</div>`).join('')}
        </div>
      </div>`;
    return;
  }

  el.innerHTML = '';
  chat.messages.forEach((m, i) => {
    appendMessageDOM(m.role, m.content, i);
  });
  scrollBottom(false);
}

function appendMessageDOM(role, content, idx) {
  const el = document.getElementById('messages');
  // Remove welcome if present
  const w = el.querySelector('.welcome');
  if (w) w.remove();

  const group = document.createElement('div');
  group.className = `msg-group ${role === 'user' ? 'user' : 'ai'}`;
  group.dataset.idx = idx ?? '';

  if (role === 'assistant') {
    group.innerHTML = `
      <div class="msg-meta"><span class="msg-meta-name">FLASHBOT</span></div>
      <div class="bubble ai" id="bubble-${idx ?? 'last'}">${renderMarkdown(content)}</div>
      <div class="bubble-actions">
        <button class="action-btn" onclick="copyMsg(this,'${encodeURIComponent(content)}')">⎘ Copy</button>
        <button class="action-btn" onclick="regenerate()">↺ Regenerate</button>
      </div>`;
  } else {
    group.innerHTML = `
      <div class="bubble user">${esc(content)}</div>
      <div class="bubble-actions">
        <button class="action-btn" onclick="copyMsg(this,'${encodeURIComponent(content)}')">⎘ Copy</button>
      </div>`;
  }

  el.appendChild(group);
}

// ═══════════════════════════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════════════════════════
async function send(overrideMessages) {
  if (isStreaming) return;

  const inputEl = document.getElementById('msg-input');
  const userText = overrideMessages ? null : inputEl.value.trim();

  if (!overrideMessages && !userText) return;

  // Ensure active chat
  if (!state.activeChatId) newChat();
  const chat = getActiveChat();

  // Add user message
  if (!overrideMessages) {
    const text = userText;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    chat.messages.push({ role: 'user', content: text });
    if (chat.messages.length === 1) {
      chat.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
    }
    appendMessageDOM('user', text);
    saveState();
    renderSidebar();
  }

  const messagesToSend = overrideMessages || chat.messages;

  // Typing indicator
  const typingEl = createTypingIndicator();
  const msgsEl = document.getElementById('messages');
  msgsEl.appendChild(typingEl);
  scrollBottom();
  isStreaming = true;

  // Get system prompt
  const persona = PERSONAS.find(p => p.id === state.personaId) || PERSONAS[0];
  const systemPrompt = persona.prompt || PERSONAS[0].prompt;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messagesToSend.map(m => ({ role: m.role, content: m.content })),
        systemPrompt,
        model: state.model,
      }),
    });

    typingEl.remove();

    if (!res.ok) {
      // Try to parse error JSON
      const errData = await res.json().catch(() => null);
      throw new Error(errData?.error || `Server error ${res.status}`);
    }

    const contentType = res.headers.get('content-type') || '';

    if (contentType.includes('text/event-stream')) {
      // ── STREAMING ──
      const idx = chat.messages.length;
      const group = document.createElement('div');
      group.className = 'msg-group ai';
      group.dataset.idx = idx;
      group.innerHTML = `
        <div class="msg-meta"><span class="msg-meta-name">FLASHBOT</span></div>
        <div class="bubble ai" id="bubble-stream"></div>`;
      msgsEl.appendChild(group);

      const bubbleEl = document.getElementById('bubble-stream');
      bubbleEl.innerHTML = '<span class="cursor"></span>';

      let fullText = '';
      let lastScroll = 0;

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const delta = parsed.choices?.[0]?.delta?.content;
            if (delta) {
              fullText += delta;
              // Throttle DOM updates to every ~50ms
              const now = Date.now();
              if (now - lastScroll > 50) {
                bubbleEl.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
                scrollBottom();
                lastScroll = now;
              }
            }
          } catch(e) { /* skip bad chunk */ }
        }
      }

      // Final render without cursor
      bubbleEl.innerHTML = renderMarkdown(fullText);
      bubbleEl.id = `bubble-${idx}`;

      // Add action buttons
      const actions = document.createElement('div');
      actions.className = 'bubble-actions';
      actions.innerHTML = `
        <button class="action-btn" onclick="copyMsg(this,'${encodeURIComponent(fullText)}')">⎘ Copy</button>
        <button class="action-btn" onclick="regenerate()">↺ Regenerate</button>`;
      group.appendChild(actions);

      // Save to state
      chat.messages.push({ role: 'assistant', content: fullText });
      saveState();
      renderSidebar();
      scrollBottom();

    } else {
      // ── FALLBACK: non-streaming JSON ──
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const reply = data.reply || data.choices?.[0]?.message?.content || '(Tidak ada respons)';

      chat.messages.push({ role: 'assistant', content: reply });
      appendMessageDOM('assistant', reply, chat.messages.length - 1);
      saveState();
      renderSidebar();
      scrollBottom();
    }

  } catch(err) {
    typingEl?.remove();
    const errGroup = document.createElement('div');
    errGroup.className = 'msg-group ai';
    errGroup.innerHTML = `
      <div class="bubble ai" style="border-color:rgba(255,100,100,.2);color:#ff9999;">
        ⚠️ <strong>Error:</strong> ${esc(err.message)}<br>
        <span style="font-size:12px;color:var(--text2)">Pastikan GROQ_API_KEY sudah diset di Vercel Environment Variables.</span>
      </div>`;
    document.getElementById('messages').appendChild(errGroup);
    scrollBottom();
    toast(err.message, 'err');
  }

  isStreaming = false;
  attachedFile = null;
  document.getElementById('file-preview').classList.remove('show');
}

function sendMessage() { send(null); }

function chipSend(text) {
  const decoded = text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  if (!state.activeChatId) newChat();
  const chat = getActiveChat();
  chat.messages.push({ role: 'user', content: decoded });
  if (chat.messages.length === 1) {
    chat.title = decoded.slice(0, 40);
  }
  appendMessageDOM('user', decoded);
  saveState();
  renderSidebar();
  send(chat.messages);
}

// ═══════════════════════════════════════════════════
//  COPY
// ═══════════════════════════════════════════════════
function copyMsg(btn, encoded) {
  const text = decodeURIComponent(encoded);
  if (!navigator.clipboard) {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
    return;
  }
  navigator.clipboard.writeText(text).then(() => showCopied(btn)).catch(() => {
    toast('Gagal copy', 'err');
  });
}

function showCopied(btn) {
  const orig = btn.textContent;
  btn.textContent = '✓ Copied';
  btn.classList.add('success');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 1800);
  toast('Disalin!', 'ok');
}

// ═══════════════════════════════════════════════════
//  REGENERATE
// ═══════════════════════════════════════════════════
function regenerate() {
  if (isStreaming) return;
  const chat = getActiveChat();
  if (!chat) return;

  // Remove last assistant message
  if (chat.messages.length && chat.messages[chat.messages.length - 1].role === 'assistant') {
    chat.messages.pop();
  }
  saveState();

  // Re-render messages
  renderMessages();

  // Re-send with current history
  send(chat.messages);
}

// ═══════════════════════════════════════════════════
//  TYPING INDICATOR
// ═══════════════════════════════════════════════════
function createTypingIndicator() {
  const el = document.createElement('div');
  el.className = 'msg-group ai';
  el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="msg-meta"><span class="msg-meta-name">FLASHBOT</span></div>
    <div class="typing-ind">
      <span></span><span></span><span></span>
    </div>`;
  return el;
}

// ═══════════════════════════════════════════════════
//  SCROLL
// ═══════════════════════════════════════════════════
function scrollBottom(smooth = true) {
  const el = document.getElementById('messages');
  if (!el) return;
  // Only auto-scroll if user is near bottom (within 200px)
  const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 200;
  if (nearBottom || !smooth) {
    el.scrollTop = el.scrollHeight;
  }
}

// ═══════════════════════════════════════════════════
//  MARKDOWN RENDERER
// ═══════════════════════════════════════════════════
function renderMarkdown(raw) {
  if (!raw) return '';
  let t = raw;

  // Fenced code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const l = lang ? `<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${esc(lang)}</span>` : '';
    return `<pre>${l}<code>${esc(code.trim())}</code></pre>`;
  });

  // Escape HTML in non-code parts (already escaped above for code)
  // We need to escape the non-code text
  const parts = t.split(/(<pre>[\s\S]*?<\/pre>)/g);
  t = parts.map((part, i) => {
    if (i % 2 === 1) return part; // code block, don't touch
    return esc(part);
  }).join('');

  // Inline code (after escape)
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Headers
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // Bold & italic
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  t = t.replace(/__(.+?)__/g,         '<strong>$1</strong>');
  t = t.replace(/_(.+?)_/g,           '<em>$1</em>');

  // Blockquote
  t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // HR
  t = t.replace(/^---$/gm, '<hr>');

  // Unordered lists
  t = t.replace(/^(\s*[-*•] .+(?:\n\s*[-*•] .+)*)/gm, (block) => {
    const items = block.split('\n').filter(Boolean).map(l =>
      `<li>${l.replace(/^\s*[-*•] /, '')}</li>`
    ).join('');
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  t = t.replace(/^(\s*\d+\. .+(?:\n\s*\d+\. .+)*)/gm, (block) => {
    const items = block.split('\n').filter(Boolean).map(l =>
      `<li>${l.replace(/^\s*\d+\. /, '')}</li>`
    ).join('');
    return `<ol>${items}</ol>`;
  });

  // Paragraphs — convert double newlines to <p>
  t = t.replace(/\n{2,}/g, '</p><p>');
  t = t.replace(/\n/g, '<br>');

  // Wrap in paragraph if not already block-level
  if (!/^<(h[1-3]|ul|ol|pre|blockquote|hr)/.test(t.trim())) {
    t = `<p>${t}</p>`;
  }

  return t;
}

// ═══════════════════════════════════════════════════
//  PERSONA
// ═══════════════════════════════════════════════════
function renderPersonaGrid() {
  const grid = document.getElementById('persona-grid');
  grid.innerHTML = PERSONAS.map(p => `
    <div class="persona-option ${p.id === state.personaId ? 'active' : ''}"
         onclick="selectPersonaOption('${p.id}')">
      <span class="persona-option-icon">${p.icon}</span>
      <div class="persona-option-info">
        <div class="persona-option-name">${p.name}</div>
        <div class="persona-option-desc">${p.desc}</div>
      </div>
      ${p.id === state.personaId ? '<span class="persona-check">✓</span>' : ''}
    </div>`).join('');

  // Show custom prompt input if custom selected
  const wrap = document.getElementById('custom-prompt-wrap');
  wrap.style.display = state.personaId === 'custom' ? 'block' : 'none';
  if (state.personaId === 'custom') {
    document.getElementById('custom-prompt-input').value = state.customPrompt;
  }
}

function selectPersonaOption(id) {
  state.personaId = id;
  const wrap = document.getElementById('custom-prompt-wrap');
  wrap.style.display = id === 'custom' ? 'block' : 'none';
  renderPersonaGrid();
}

function savePersona() {
  if (state.personaId === 'custom') {
    const prompt = document.getElementById('custom-prompt-input').value.trim();
    state.customPrompt = prompt;
    const cp = PERSONAS.find(p => p.id === 'custom');
    if (cp) cp.prompt = prompt;
  }
  saveState();
  updatePersonaBadge();
  closeModal('persona-modal');
  const p = PERSONAS.find(p => p.id === state.personaId);
  toast(`Persona: ${p?.name || 'Adaptive'}`, 'ok');
}

function updatePersonaBadge() {
  const p = PERSONAS.find(p => p.id === state.personaId);
  document.getElementById('persona-badge').textContent = p?.name?.split(' ')[0] || 'Adaptive';
}

// ═══════════════════════════════════════════════════
//  MODEL
// ═══════════════════════════════════════════════════
function onModelChange() {
  state.model = document.getElementById('model-select').value;
  saveState();
  toast(`Model: ${MODELS[state.model] || state.model}`, 'ok');
}

// ═══════════════════════════════════════════════════
//  FILE UPLOAD
// ═══════════════════════════════════════════════════
function onFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  attachedFile = file;
  document.getElementById('file-preview-name').textContent = file.name;
  document.getElementById('file-preview').classList.add('show');
  toast(`File dipilih: ${file.name}`, 'ok');
  input.value = '';
}

function removeFile() {
  attachedFile = null;
  document.getElementById('file-preview').classList.remove('show');
}

// ═══════════════════════════════════════════════════
//  INPUT SETUP
// ═══════════════════════════════════════════════════
function setupInput() {
  const inp = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');

  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 180) + 'px';
    btn.disabled = !inp.value.trim();
  });

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!btn.disabled && !isStreaming) sendMessage();
    }
  });

  btn.addEventListener('click', () => {
    if (!isStreaming) sendMessage();
  });
}

// ═══════════════════════════════════════════════════
//  SIDEBAR MOBILE
// ═══════════════════════════════════════════════════
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════════════
function openModal(id) {
  if (id === 'persona-modal') renderPersonaGrid();
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-bg').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init() {
  loadState();
  document.getElementById('model-select').value = state.model;
  updatePersonaBadge();
  setupInput();

  if (!state.chats.length || !state.activeChatId) {
    newChat();
  } else {
    renderSidebar();
    renderMessages();
  }
}

init();
</script>
</body>
</html>
